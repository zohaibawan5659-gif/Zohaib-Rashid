<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Father's Profession Chatbot</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: var(--bg-main);
        }
        .chat-window {
            width: 90%;
            max-width: 800px;
            height: 90vh;
            max-height: 800px;
            transform: none !important;
        }
        .close-btn {
            display: none;
        }
        .suggested-questions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 1rem;
            margin-bottom: 1rem;
            animation: fadeIn 0.5s ease forwards;
        }
        .suggestion-btn {
            background: var(--bg-main);
            border: 1px solid var(--border-glass);
            color: var(--text-secondary);
            padding: 12px 16px;
            border-radius: var(--border-radius-md);
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: var(--font-body);
            font-size: 0.9rem;
        }
        .suggestion-btn:hover {
            border-color: var(--accent-primary);
            color: var(--text-primary);
            background: rgba(59, 130, 246, 0.1);
            transform: translateY(-2px);
        }
        @media (max-width: 600px) {
            .suggested-questions {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="chat-window glass-card">
        <div class="chat-header">
            <h3>Father's Profession Chatbot</h3>
        </div>
        <div class="chat-messages" id="chat-messages">
            <div class="message bot-message">
                <p>Hello! I am here to answer questions about Muhammad Rashid and his career at WAPDA. What would you like to know?</p>
            </div>
            
            <div class="suggested-questions" id="suggested-questions">
                <button class="suggestion-btn">What does an LM (Lineman) do?</button>
                <button class="suggestion-btn">What is the role of an LS (Line Superintendent)?</button>
                <button class="suggestion-btn">How does one get promoted from LM to LS?</button>
                <button class="suggestion-btn">What is WAPDA?</button>
            </div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="Ask about LM or LS roles..." autocomplete="off" />
            <button id="send-chat-btn" class="btn btn-primary">Send</button>
        </div>
    </div>
    <script src="js/chatbot.js"></script>
</body>
</html>
